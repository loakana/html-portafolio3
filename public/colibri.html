<h1>Colibrí</h1>
<hr/>
<p align="justify">
    El colibrí es un pequeño pájaro conocido por su capacidad de volar hacia atrás y su rápido aleteo. En la leyenda del Amaru, el colibrí representa la esperanza y la resiliencia, ya que se transforma a partir de una planta de qantu para buscar ayuda divina en tiempos de sequía.
